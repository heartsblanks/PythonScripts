name: Trade Scan

on:
  workflow_dispatch:
    inputs:
      account_size:
        description: "Account size"
        required: true
      mode:
        description: "primary or secondary"
        required: true

jobs:
  run-scan:
    runs-on: ubuntu-latest
    env:
      TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas_market_calendars

      - name: Run script
        run: |
          python trade_scan.py "${{ inputs.account_size }}" "${{ inputs.mode }}"
